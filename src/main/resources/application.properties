# Application
spring.application.name=Host-Student-Meeting
server.port=8080

# ===== ACTIVE PROFILE =====
# "dev"   ? H2 in PostgreSQL-compat mode (runs instantly, zero install)
# "pgsql" ? connects to external PostgreSQL (docker / local install)
# "prod"  ? production PostgreSQL with env-var config (cloud)
spring.profiles.active=dev

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== FILE UPLOAD / RECORDING STORAGE =====
# Overridden by APP_UPLOAD_DIR / APP_RECORDING_DIR env vars in production
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.recording.dir=${APP_RECORDING_DIR:./recordings}
app.recording.retention.days=${RECORDING_RETENTION_DAYS:10}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ===== SECURITY =====
app.jwt.secret=HostStudentMeetingSecretKey2026VeryLongSecureKey
app.jwt.expiration=86400000

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== LOGGING =====
logging.level.com.host.studen=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
