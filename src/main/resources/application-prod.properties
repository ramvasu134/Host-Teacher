# ===== Production Cloud Profile (Render.com) =====
# Active when: SPRING_PROFILES_ACTIVE=prod
#
# Render.com injects these env vars automatically from the linked PostgreSQL:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#
# Additional env vars to set manually in Render dashboard:
#   JAVA_OPTS (optional override), JWT_SECRET (strongly recommended)

# ?? DataSource ???????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ?? Connection Pool (tuned for Render free tier) ?????????????????????????????
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000

# ?? Server ???????????????????????????????????????????????????????????????????
server.port=${PORT:8080}

# ?? Security ?????????????????????????????????????????????????????????????????
spring.h2.console.enabled=false
app.jwt.secret=${JWT_SECRET:HostStudentMeetingSecretKey2026VeryLongSecureKey}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ?? Thymeleaf (cache ON in production) ???????????????????????????????????????
spring.thymeleaf.cache=true

# ?? File upload limits ????????????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ?? Logging ??????????????????????????????????????????????????????????????????
logging.level.com.host.studen=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
# Log to stdout only (no file) ? Render captures stdout
logging.file.name=
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
